<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iova Alex | Portfolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #020617;
  color: #e2e8f0;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* CURSOR */
.cursor {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  position: fixed;
  background: #38bdf8;
  pointer-events: none;
  z-index: 3000;
  transform: translate(-50%, -50%);
}

.cursor-trail {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  position: fixed;
  border: 2px solid #a78bfa;
  pointer-events: none;
  z-index: 2999;
  transform: translate(-50%, -50%);
  opacity: 0.5;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  backdrop-filter: blur(12px);
  background: rgba(2,6,23,0.7);
  display: flex;
  justify-content: center;
  gap: 25px;
  z-index: 1000;
}

nav a {
  color: #38bdf8;
  text-decoration: none;
  font-weight: 600;
}

/* HERO */
#home {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

.hero-title {
  font-size: 60px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(56,189,248,0.2), transparent);
  z-index: -1;
}

/* SECTIONS */
section {
  padding: 120px 20px;
  max-width: 1100px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 25px;
  margin-top: 30px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px) scale(1.01);
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.img-box img {
  width: 100%;
  border-radius: 10px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.modal-content {
  background: #020617;
  padding: 30px;
  border-radius: 12px;
  max-width: 600px;
  border: 1px solid #38bdf8;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
  color: #38bdf8;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 5000;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #38bdf8;
  border-top: 4px solid transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div class="cursor"></div>
<div class="cursor-trail"></div>

<nav>
  <a href="#home">Home</a>
  <a href="#projects">Projects</a>
</nav>

<section id="home">
  <div class="hero-bg"></div>
  <h1 class="hero-title">Iova Alex</h1>
  <p>Electronics & IT Student</p>
</section>

<section id="projects">

  <h2>Projects</h2>

  <div class="card" onclick="openModal('mysql')">
    <h3>MySQL Web Application</h3>
    <p>Click to view details</p>
  </div>

  <div class="card" onclick="openModal('laser')">
    <h3>Laser Detection System</h3>
    <p>Click to view details</p>
  </div>

  <div class="card" onclick="openModal('orcad')">
    <h3>Low-Frequency Amplifier</h3>
    <p>Click to view details</p>
  </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// loader
window.addEventListener("load", () => {
  document.getElementById("loader").style.display = "none";
});

// cursor
const cursor = document.querySelector(".cursor");
const trail = document.querySelector(".cursor-trail");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";

  trail.style.left = e.clientX + "px";
  trail.style.top = e.clientY + "px";
});

// modal content
function openModal(project) {
  const modal = document.getElementById("modal");
  const body = document.getElementById("modal-body");

  let content = "";

  if(project === "mysql") {
    content = `
      <h2>MySQL Web Application</h2>
      <p>Full-stack Java application using JSP, Hibernate and MySQL.</p>
      <p><b>Features:</b> CRUD operations, relational data, dynamic forms.</p>
    `;
  }

  if(project === "laser") {
    content = `
      <h2>Laser Detection System</h2>
      <p>ESP32 + GSM SIM800L system for security alerts.</p>
    `;
  }

  if(project === "orcad") {
    content = `
      <h2>Low-Frequency Amplifier</h2>
      <p>Designed and simulated using OrCAD 17.2.</p>
      <p>Verified performance via simulation and lab implementation.</p>
    `;
  }

  body.innerHTML = content;
  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// parallax hero
document.addEventListener("mousemove", (e) => {
  const hero = document.querySelector("#home");
  let x = (window.innerWidth - e.pageX) / 50;
  let y = (window.innerHeight - e.pageY) / 50;
  hero.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
